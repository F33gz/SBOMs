services:
  # Clones repos, generates SBOMs and vulnerability reports
  processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
      network: host
    container_name: sbom-processor
    environment:
      - GITHUB_ORG=${GITHUB_ORG}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - sbom-data:/data
    network_mode: host

  # Jupyter Lab for interactive analysis
  jupyter:
    image: quay.io/jupyter/scipy-notebook:latest
    container_name: sbom-jupyter
    user: root
    # Using network_mode: host, so Jupyter will natively bind to port 8888 on the host
    environment:
      - JUPYTER_TOKEN=sbom-analysis
      - GRANT_SUDO=yes
    volumes:
      - sbom-data:/data
      - ./notebooks:/home/jovyan/work
    network_mode: host
    depends_on:
      processor:
        condition: service_completed_successfully

volumes:
  sbom-data:
    driver: local
